name: Deploy Simafri

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test SSH then Deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 -H $SSH_HOST >> ~/.ssh/known_hosts 2>&1
          echo "=== TEST SSH ==="
          ssh -v -p 2222 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "echo SSH_CONNECTION_OK" 2>&1
          echo "=== RSYNC ==="
          rsync -avzr --delete -e "ssh -i ~/.ssh/id_rsa -p 2222 -o StrictHostKeyChecking=no" dist/ $SSH_USER@$SSH_HOST:/home/horskad1/domains/horskadr.mg/public_html/ 2>&1
