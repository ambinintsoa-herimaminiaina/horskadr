name: Deploy Simafri

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set +e
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>&1 || true
          rsync -avzr --delete             -e "ssh -i ~/.ssh/id_rsa -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"             dist/             "$SSH_USER@$SSH_HOST:/home/horskad1/domains/horskadr.mg/public_html/"
          EXIT=$?
          echo "Rsync exit code: $EXIT"
          exit $EXIT
